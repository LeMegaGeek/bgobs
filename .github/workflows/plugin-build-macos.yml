# file: .github/workflows/plugin-build-macos.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-05-28

name: Plugin build macOS

on:
  workflow_call:
    inputs:
      job-index:
        description: The job index for logging.
        required: false
        type: number
        default: 0
      environment:
        description: The environment name for the build jobs, or empty string for no environment.
        required: false
        type: string
        default: ''
      runs-on:
        description: The runner label to run this workflow on.
        required: true
        type: string
      DEVELOPER_DIR:
        description: The value of DEVELOPER_DIR environment variable.
        required: true
        type: string
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs.
        required: true
        type: string

    secrets:
      MACOS_NOTARIZATION_PASSWORD:
        required: false
      MACOS_NOTARIZATION_USERNAME:
        required: false
      MACOS_SIGNING_APPLICATION_IDENTITY:
        required: false
      MACOS_SIGNING_CERT_PASSWORD:
        required: false
      MACOS_SIGNING_CERT:
        required: false
      MACOS_SIGNING_INSTALLER_IDENTITY:
        required: false

permissions: {}

jobs:
  build-macos:
    # FIXME: Environments will be created later.
    # environment: ${{ inputs.environment }}
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 180

    permissions:
      contents: read

    env:
      DEVELOPER_DIR: '${{ inputs.DEVELOPER_DIR }}'
      OSX_ARCHITECTURES: 'arm64;x86_64'
      OSX_DEPLOYMENT_TARGET: '12.0'
      VCPKG_BINARY_SOURCES: '${{ inputs.VCPKG_BINARY_SOURCES }}'

    steps:
      - name: Output Image Metadata
        id: image-metadata
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          echo "ImageVersion=$ImageVersion" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract buildspec.props
        id: buildspec
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          awk '!/(^#|^[[:space:]]*$)/' buildspec.props >> "$GITHUB_OUTPUT"

      - name: Checkout obs-studio
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: obsproject/obs-studio
          ref: ${{ steps.buildspec.outputs.obs_studio_git_tag }}
          persist-credentials: false
          path: obs-studio
          filter: blob:none

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.buildspec.outputs.vcpkg_git_tag }}
          persist-credentials: false
          path: vcpkg
          filter: blob:none

      - name: Checkout ONNX Runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/onnxruntime
          ref: ${{ steps.buildspec.outputs.onnxruntime_git_tag }}
          persist-credentials: false
          path: onnxruntime
          submodules: recursive

      - name: Set up Python for build requirements
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      - name: Set up ccache
        id: setup-ccache
        uses: ./.github/actions/setup-ccache

      - name: Print Xcode version
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          xcodebuild -version

      - name: Run bootstrap-vcpkg.sh
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Fetch CMake and Ninja from vcpkg toolchains
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          export PATH=/usr/bin:/bin:/usr/sbin:/sbin VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"
          ./vcpkg/vcpkg fetch cmake
          ./vcpkg/vcpkg fetch ninja

      - name: Build OBS (macOS)
        id: build-obs
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          CMAKE_EXE="$(VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg" ./vcpkg/vcpkg fetch cmake | tail -n1)"

          "$CMAKE_EXE" --version

          # shellcheck disable=SC2120
          xcbeautify() { if command -v xcbeautify >/dev/null 2>&1; then command xcbeautify "$@"; else cat; fi; }

          build_obs_macos() {
            env -i \
              DEVELOPER_DIR="$DEVELOPER_DIR" \
              HOME="$HOME" \
              PATH="${CMAKE_EXE%/*}:/usr/bin:/bin:/usr/sbin:/sbin" \
              ./scripts/build_obs_macos.sh "$@"
          }

          build_obs_macos download_prebuilt
          build_obs_macos download_qt6
          build_obs_macos configure_obs
          build_obs_macos build_obs Release | tee build_obs_release.log | xcbeautify
          build_obs_macos install_obs Release

      - name: Upload OBS build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Build OBS logs
          path: |
            build_obs*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Install dependencies listed on vcpkg.json (arm64-osx-obs)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          env -i \
            DEVELOPER_DIR="$DEVELOPER_DIR" \
            HOME="$HOME" \
            PATH=/usr/bin:/bin:/usr/sbin:/sbin \
            VCPKG_BINARY_SOURCES="$VCPKG_BINARY_SOURCES" \
            VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg" \
            ./vcpkg/vcpkg install --triplet=arm64-osx-obs --x-install-root=vcpkg_installed_arm64

      - name: Install dependencies listed on vcpkg.json (x64-osx-obs)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          env -i \
            DEVELOPER_DIR="$DEVELOPER_DIR" \
            HOME="$HOME" \
            PATH=/usr/bin:/bin:/usr/sbin:/sbin \
            VCPKG_BINARY_SOURCES="$VCPKG_BINARY_SOURCES" \
            VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg" \
            ./vcpkg/vcpkg install --triplet=x64-osx-obs --x-install-root=vcpkg_installed_x64

      - name: Lipo vcpkg_installed
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          ./scripts/lipo_vcpkg_macos.sh \
            ./vcpkg_installed/universal-osx-obs \
            ./vcpkg_installed_arm64/arm64-osx-obs \
            ./vcpkg_installed_x64/x64-osx-obs

      - name: Generate toolchain report for building ONNX Runtime (macOS)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          PYTHON_EXE: '${{ steps.setup-python.outputs.python-path }}'
        run: |
          "$PYTHON_EXE" --version

          env -i \
            DEVELOPER_DIR="$DEVELOPER_DIR" \
            HOME="$HOME" \
            PATH="/usr/bin:/bin:/usr/sbin:/sbin" \
            PYTHON="$PYTHON_EXE" \
            ./scripts/build_onnxruntime_macos.sh toolchain_report | tee build_onnxruntime_toolchain.txt

      - name: Restore ONNX Runtime ccache (macOS)
        id: restore-ccache-ort
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: .ccache_ort
          key: ccache-ort-${{ runner.os }}-universal-${{ steps.image-metadata.outputs.ImageVersion }}-${{ hashFiles('build_onnxruntime_toolchain.txt') }}-${{ steps.setup-ccache.outputs.VERSION }}
          restore-keys: |
            ccache-ort-${{ runner.os }}-universal-${{ steps.image-metadata.outputs.ImageVersion }}-${{ hashFiles('build_onnxruntime_toolchain.txt') }}-
            ccache-ort-${{ runner.os }}-universal-${{ steps.image-metadata.outputs.ImageVersion }}-
            ccache-ort-${{ runner.os }}-universal-

      - name: Reset .ccache_ort stats
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CCACHE_DIR: '${{ github.workspace }}/.ccache_ort'
          CCACHE_BASEDIR: '${{ github.workspace }}'
        run: |
          ccache -z

      - name: Build ONNX Runtime (macOS)
        id: build-onnxruntime
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          PYTHON_EXE: '${{ steps.setup-python.outputs.python-path }}'
        run: |
          CCACHE_EXE="$(command -v ccache)"
          CMAKE_EXE="$(VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg" ./vcpkg/vcpkg fetch cmake | tail -n1)"
          NINJA_EXE="$(VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg" ./vcpkg/vcpkg fetch ninja | tail -n1)"

          # shellcheck disable=SC2120
          xcbeautify() { if command -v xcbeautify >/dev/null 2>&1; then command xcbeautify "$@"; else cat; fi; }

          "$CCACHE_EXE" -V
          "$CMAKE_EXE" --version
          "$NINJA_EXE" --version

          build_onnxruntime_macos() {
            env -i \
              CCACHE_DIR="$GITHUB_WORKSPACE/.ccache_ort" \
              CCACHE_BASEDIR="$GITHUB_WORKSPACE" \
              CCACHE_SLOPPINESS='include_file_mtime,time_macros' \
              DEVELOPER_DIR="$DEVELOPER_DIR" \
              HOME="$HOME" \
              PATH="${CMAKE_EXE%/*}:${NINJA_EXE%/*}:${CCACHE_EXE%/*}:/usr/bin:/bin:/usr/sbin:/sbin" \
              PYTHON="$PYTHON_EXE" \
              VCPKG_BINARY_SOURCES="$VCPKG_BINARY_SOURCES" \
              ./scripts/build_onnxruntime_macos.sh "$@"
          }

          build_onnxruntime_macos patch_onnxruntime
          build_onnxruntime_macos build_py arm64 --update
          build_onnxruntime_macos build_py x86_64 --update
          build_onnxruntime_macos build_py arm64 --build | tee build_onnxruntime_build_arm64.log | xcbeautify
          build_onnxruntime_macos build_py x86_64 --build | tee build_onnxruntime_build_x86_64.log | xcbeautify
          build_onnxruntime_macos install_onnxruntime

      - name: Upload ONNX Runtime build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Build ONNX Runtime logs
          path: |
            build_onnxruntime_*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Show .ccache_ort stats
        if: always()
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CCACHE_DIR: '${{ github.workspace }}/.ccache_ort'
          CCACHE_BASEDIR: '${{ github.workspace }}'
        run: |
          ccache -s

      - name: Build Plugin (macOS)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          CMAKE_EXE="$(VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg" ./vcpkg/vcpkg fetch cmake | tail -n1)"

          plugin_cmake() {
            env -i \
              DEVELOPER_DIR="$DEVELOPER_DIR" \
              HOME="$HOME" \
              PATH="/usr/bin:/bin:/usr/sbin:/sbin" \
              VCPKG_BINARY_SOURCES="$VCPKG_BINARY_SOURCES" \
              "$CMAKE_EXE" "$@"
          }

          plugin_cmake -G Xcode -S . -B build_plugin
          plugin_cmake --build build_plugin --config RelWithDebInfo | tee build_plugin_relwithdebinfo.log | xcbeautify

      - name: Upload Plugin build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Build Plugin logs
          path: |
            build_plugin_*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Install Plugin (macOS)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          cmake --install build_plugin --config RelWithDebInfo --strip --prefix build_stage

      - name: Extract dSYM
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          mkdir -p release
          . ./build_plugin/cmake_export.sh

          dsymutil "build_plugin/RelWithDebInfo/$PLUGIN_NAME.plugin/Contents/MacOS/$PLUGIN_NAME" -o "build_plugin/$PLUGIN_NAME.dSYM"
          ZSTD_CLEVEL=19 tar -acf "release/$PLUGIN_NAME.dSYM.tar.zst" --mac-metadata "build_plugin/$PLUGIN_NAME.dSYM"

      - name: Set up macOS Signing Certificates
        if: inputs.environment == 'production-macos'
        id: codesign
        uses: ./.github/actions/setup-macos-codesigning
        with:
          MACOS_SIGNING_APPLICATION_IDENTITY: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
          MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}

      - name: Package Plugin (macOS)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CODESIGN_ENABLED: "${{ inputs.environment == 'production-macos' }}"
          MACOS_SIGNING_APPLICATION_IDENTITY: ${{ secrets.MACOS_SIGNING_APPLICATION_IDENTITY }}
          MACOS_SIGNING_INSTALLER_IDENTITY: ${{ secrets.MACOS_SIGNING_INSTALLER_IDENTITY }}
        run: |
          mkdir -p release
          . ./build_plugin/cmake_export.sh

          PLUGIN_BUNDLE="build_stage/Library/Application Support/obs-studio/plugins/$PLUGIN_NAME.plugin"

          if [[ "$CODESIGN_ENABLED" == true ]]; then
            codesign -s "$MACOS_SIGNING_APPLICATION_IDENTITY" -f --deep --options runtime --timestamp "$PLUGIN_BUNDLE"
          fi

          pkgbuild \
            --root build_stage \
            --identifier "$PLUGIN_BUNDLE_ID" \
            --version "$PLUGIN_VERSION" \
            --install-location / \
            build_plugin/component.pkg

          if [[ "$CODESIGN_ENABLED" == true ]]; then
            productbuild \
              --distribution build_plugin/Distribution \
              --package-path build_plugin \
              --resources . \
              --sign "$MACOS_SIGNING_INSTALLER_IDENTITY" \
              "release/$PLUGIN_NAME-$PLUGIN_VERSION-macos-universal.pkg"
          else
            productbuild \
              --distribution build_plugin/Distribution \
              --package-path build_plugin \
              --resources . \
              "release/$PLUGIN_NAME-$PLUGIN_VERSION-macos-universal.pkg"
          fi

      - name: Notarize Installer
        if: inputs.environment == 'production-macos'
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          CODESIGN_TEAM: '${{ steps.codesign.outputs.CODESIGN_TEAM }}'
          MACOS_NOTARIZATION_PASSWORD: '${{ secrets.MACOS_NOTARIZATION_PASSWORD }}'
          MACOS_NOTARIZATION_USERNAME: '${{ secrets.MACOS_NOTARIZATION_USERNAME }}'
        run: |
          . ./build_plugin/cmake_export.sh

          xcrun notarytool submit "release/$PLUGIN_NAME-$PLUGIN_VERSION-macos-universal.pkg" \
            --apple-id "$MACOS_NOTARIZATION_USERNAME" \
            --password "$MACOS_NOTARIZATION_PASSWORD" \
            --team-id "$CODESIGN_TEAM" \
            --wait

          xcrun stapler staple "release/$PLUGIN_NAME-$PLUGIN_VERSION-macos-universal.pkg"

      - name: Upload Plugin Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pluginbinary-${{ runner.os }}-universal-${{ github.run_id }}
          path: |
            release/*.pkg
            release/*.dSYM.tar.zst
          if-no-files-found: error
          retention-days: 7
