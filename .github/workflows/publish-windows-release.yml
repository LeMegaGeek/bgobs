name: Publish Windows Release

on:
  workflow_run:
    workflows:
      - Windows Package
    types:
      - completed

permissions: {}

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      (startsWith(github.event.workflow_run.head_branch, 'v') ||
       startsWith(github.event.workflow_run.head_branch, 'release-build/'))
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout release metadata
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          tag="${HEAD_BRANCH#release-build/}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify published Windows packages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          runtime_asset="bgobs-$version-windows-x64.zip"
          symbols_asset="bgobs-$version-windows-x64-pdb.zip"
          assets="$(gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[].name')"
          grep -Fxq "$runtime_asset" <<< "$assets"
          grep -Fxq "$symbols_asset" <<< "$assets"

      - name: Signal successful publication
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          status_ref="heads/release-status/$TAG"
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/$status_ref" >/dev/null 2>&1; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/$status_ref" \
              -f sha="$HEAD_SHA" \
              -F force=true
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/heads/release-status/$TAG" \
              -f sha="$HEAD_SHA"
          fi
