name: Plugin CI

# file: .github/workflows/plugin.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-05-28

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['*']

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-slim
    timeout-minutes: 10

    permissions: {}

    outputs:
      VCPKG_BINARY_SOURCES: ${{ steps.config.outputs.VCPKG_BINARY_SOURCES }}

    steps:
      - name: Config
        id: config
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          printf 'VCPKG_BINARY_SOURCES=%s\n' 'clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha},read' >> "${GITHUB_OUTPUT}"

  # build-windows:
  #   needs: config
  #   permissions:
  #     contents: read
  #   uses: ./.github/workflows/plugin-build-windows.yml
  #   with:
  #     VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
  #     vcpkg-version: ${{ needs.config.outputs.VCPKG_VERSION }}
  #     ort-version: ${{ needs.config.outputs.ORT_VERSION }}

  build-macos:
    needs: config
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-macos.yml
    with:
      environment: ${{ github.ref == 'refs/heads/main' && 'production-macos' || '' }}
      runs-on: macos-15
      DEVELOPER_DIR: /Applications/Xcode_16.4.app
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
    secrets: inherit

  # build-ubuntu:
  #   needs: config
  #   permissions:
  #     contents: read
  #   uses: ./.github/workflows/plugin-build-ubuntu.yml
  #   with:
  #     VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
  #     vcpkg-version: ${{ needs.config.outputs.VCPKG_VERSION }}
  #     ort-version: ${{ needs.config.outputs.ORT_VERSION }}

  accept-plugin:
    name: Accept Plugin CI
    needs: [build-macos]
    # needs: [build-windows, build-macos, build-ubuntu]
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - name: Accept plugin
        run: |
          echo 'The workflow plugin has completed successfully.'

