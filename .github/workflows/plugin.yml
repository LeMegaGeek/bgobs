name: Plugin CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  config:
    name: Validate release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      VCPKG_BINARY_SOURCES: ${{ steps.config.outputs.VCPKG_BINARY_SOURCES }}
      VCPKG_VERSION: ${{ steps.config.outputs.VCPKG_VERSION }}
      ORT_VERSION: ${{ steps.config.outputs.ORT_VERSION }}
      ORT_WINDOWS_SHA256: ${{ steps.config.outputs.ORT_WINDOWS_SHA256 }}
      OBS_LINUX_SHA256: ${{ steps.config.outputs.OBS_LINUX_SHA256 }}
      OBS_VERSION: ${{ steps.config.outputs.OBS_VERSION }}
      PLATFORM_TOOLS_SHA256: ${{ steps.config.outputs.PLATFORM_TOOLS_SHA256 }}
      PLATFORM_TOOLS_URL: ${{ steps.config.outputs.PLATFORM_TOOLS_URL }}
      PLATFORM_TOOLS_VERSION: ${{ steps.config.outputs.PLATFORM_TOOLS_VERSION }}
      VERSION: ${{ steps.config.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate versions and tag
        id: config
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          buildspec_version="$(python3 -c 'import json; print(json.load(open("buildspec.json", encoding="utf-8"))["version"])')"
          manifest_version="$(python3 -c 'import json; print(json.load(open("data/manifest.json", encoding="utf-8"))["version"])')"
          vcpkg_version="$(awk -F= '$1 == "vcpkg_git_tag" { print $2 }' buildspec.props)"
          ort_version="$(awk -F= '$1 == "onnxruntime_git_tag" { print $2 }' buildspec.props)"
          ort_windows_sha256="$(awk -F= '$1 == "onnxruntime_windows_x64_sha256" { print $2 }' buildspec.props)"
          platform_tools_version="$(awk -F= '$1 == "platform_tools_windows_x64_version" { print $2 }' buildspec.props)"
          platform_tools_url="$(awk -F= '$1 == "platform_tools_windows_x64_url" { print $2 }' buildspec.props)"
          platform_tools_sha256="$(awk -F= '$1 == "platform_tools_windows_x64_sha256" { print $2 }' buildspec.props)"
          obs_version="$(python3 -c 'import json; print(json.load(open("buildspec.json", encoding="utf-8"))["dependencies"]["obs-studio"]["version"])')"
          obs_linux_sha256="$(python3 -c 'import json; print(json.load(open("buildspec.json", encoding="utf-8"))["dependencies"]["obs-studio"]["hashes"]["linux-x86_64"])')"

          semver='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$'
          if [[ ! "$version" =~ $semver ]]; then
            echo "Invalid VERSION: $version" >&2
            exit 1
          fi
          if [[ "$buildspec_version" != "$version" || "$manifest_version" != "$version" ]]; then
            echo "VERSION, buildspec.json, and data/manifest.json must match." >&2
            exit 1
          fi
          if [[ -z "$vcpkg_version" || -z "$ort_version" ]]; then
            echo "Pinned dependency versions are missing from buildspec.props." >&2
            exit 1
          fi
          if [[ ! "$ort_windows_sha256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Invalid pinned ONNX Runtime Windows SHA-256." >&2
            exit 1
          fi
          if [[ ! "$platform_tools_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid pinned Android platform-tools version." >&2
            exit 1
          fi
          expected_platform_tools_url="https://dl.google.com/android/repository/platform-tools_r${platform_tools_version}-win.zip"
          if [[ "$platform_tools_url" != "$expected_platform_tools_url" ]]; then
            echo "Android platform-tools must use its pinned official versioned URL." >&2
            exit 1
          fi
          if [[ ! "$platform_tools_sha256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Invalid pinned Android platform-tools SHA-256." >&2
            exit 1
          fi
          if [[ ! "$obs_version" =~ $semver ]]; then
            echo "Invalid pinned OBS Studio version: $obs_version" >&2
            exit 1
          fi
          if [[ ! "$obs_linux_sha256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Invalid pinned OBS Studio Linux SHA-256." >&2
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            if [[ ! "${GITHUB_REF_NAME#v}" =~ $semver ]]; then
              echo "Release tags must be v followed by a semantic version: $GITHUB_REF_NAME" >&2
              exit 1
            fi
            if [[ "${GITHUB_REF_NAME#v}" != "$version" ]]; then
              echo "Tag $GITHUB_REF_NAME does not match VERSION $version." >&2
              exit 1
            fi
            if [[ ! -s "release-notes/$GITHUB_REF_NAME.md" ]]; then
              echo "Missing release notes: release-notes/$GITHUB_REF_NAME.md" >&2
              exit 1
            fi
            vcpkg_binary_sources='clear'
          else
            vcpkg_binary_sources='clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha},read'
          fi

          {
            echo "VCPKG_BINARY_SOURCES=$vcpkg_binary_sources"
            echo "VCPKG_VERSION=$vcpkg_version"
            echo "ORT_VERSION=$ort_version"
            echo "ORT_WINDOWS_SHA256=$ort_windows_sha256"
            echo "OBS_LINUX_SHA256=$obs_linux_sha256"
            echo "OBS_VERSION=$obs_version"
            echo "PLATFORM_TOOLS_SHA256=$platform_tools_sha256"
            echo "PLATFORM_TOOLS_URL=$platform_tools_url"
            echo "PLATFORM_TOOLS_VERSION=$platform_tools_version"
            echo "VERSION=$version"
          } >> "$GITHUB_OUTPUT"

  build-windows:
    name: Windows x64
    needs: config
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-windows.yml
    with:
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
      vcpkg-version: ${{ needs.config.outputs.VCPKG_VERSION }}
      ort-version: ${{ needs.config.outputs.ORT_VERSION }}
      ort-sha256: ${{ needs.config.outputs.ORT_WINDOWS_SHA256 }}
      platform-tools-version: ${{ needs.config.outputs.PLATFORM_TOOLS_VERSION }}
      platform-tools-url: ${{ needs.config.outputs.PLATFORM_TOOLS_URL }}
      platform-tools-sha256: ${{ needs.config.outputs.PLATFORM_TOOLS_SHA256 }}

  build-macos:
    name: macOS universal
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: config
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-macos.yml
    with:
      runs-on: macos-15
      DEVELOPER_DIR: /Applications/Xcode_16.4.app
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}

  build-macos-release:
    name: macOS universal release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: config
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-macos.yml
    with:
      runs-on: macos-15
      DEVELOPER_DIR: /Applications/Xcode_16.4.app
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
    secrets: inherit

  build-ubuntu:
    name: Linux x86_64
    needs: config
    permissions:
      contents: read
    uses: ./.github/workflows/plugin-build-ubuntu.yml
    with:
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
      vcpkg-version: ${{ needs.config.outputs.VCPKG_VERSION }}
      ort-version: ${{ needs.config.outputs.ORT_VERSION }}
      obs-version: ${{ needs.config.outputs.OBS_VERSION }}
      obs-sha256: ${{ needs.config.outputs.OBS_LINUX_SHA256 }}

  accept-plugin:
    name: Accept tested packages
    if: >-
      always() &&
      needs['build-windows'].result == 'success' &&
      needs['build-ubuntu'].result == 'success' &&
      (needs['build-macos'].result == 'success' ||
      needs['build-macos-release'].result == 'success')
    needs: [build-windows, build-macos, build-macos-release, build-ubuntu]
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Accept build matrix
        run: echo 'All platform builds, tests, and package checks completed successfully.'

  release:
    name: Aggregate release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: accept-plugin
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    uses: ./.github/workflows/plugin-release.yml
