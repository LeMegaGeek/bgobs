# date: 2026-05-23

name: Scripts CI

on:
  workflow_dispatch:

permissions: {}

jobs:
  build-macos:
    runs-on: macos-26
    timeout-minutes: 180

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bootstrap
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          bin/bootstrap

      - name: Setup
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          bin/setup

      - name: Build
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          bin/build

      - name: Install
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          cmake --install build_plugin --config RelWithDebInfo --prefix ~

  build-deb:
    strategy:
      matrix:
        runs-on:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        image:
          - debian:forky-slim
          - ubuntu:resolute

    name: ${{ matrix.image }} (${{ contains(matrix.runs-on, 'arm') && 'arm64' || 'x64' }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 180

    permissions:
      contents: read

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bootstrap, Setup, and Build
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          bin/bootstrap
          bin/setup
          bin/build

      - name: Install
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          dpkg -i release/obs-backgroundremoval_*.deb
          dpkg -L obs-backgroundremoval
