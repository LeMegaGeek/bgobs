name: ORT CI

# file: .github/workflows/ort.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-05-28

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  config:
    runs-on: ubuntu-slim
    timeout-minutes: 10

    permissions: {}

    outputs:
      VCPKG_BINARY_SOURCES: ${{ steps.config.outputs.VCPKG_BINARY_SOURCES }}

    steps:
      - name: Config
        id: config
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          printf 'VCPKG_BINARY_SOURCES=%s\n' 'clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha},read' >> "${GITHUB_OUTPUT}"


  # build-windows:
  #   permissions:
  #     contents: read
  #   uses: ./.github/workflows/ort-build-windows.yml
  #   with:
  #     VCPKG_BINARY_SOURCES: 'clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha}'
  #     ort-version: v1.24.4

  build-macos:
    needs: config
    permissions:
      contents: read
    uses: ./.github/workflows/ort-build-macos.yml
    with:
      runs-on: macos-15
      DEVELOPER_DIR: /Applications/Xcode_16.4.app
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}

  # build-ubuntu:
  #   permissions:
  #     contents: read
  #   uses: ./.github/workflows/ort-build-ubuntu.yml
  #   with:
  #     VCPKG_BINARY_SOURCES: 'clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha}'
  #     ort-version: v1.24.4

  accept-ort:
    name: Accept ORT CI
    # needs: [build-windows, build-macos, build-ubuntu]
    needs: [build-macos]
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - name: Accept ort
        run: |
          echo 'The workflow ort has completed successfully.'
