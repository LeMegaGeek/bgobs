name: Release Plugin

on:
  workflow_call:

permissions: {}

jobs:
  release:
    name: Verify and publish tested artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select secure artifact directory
        id: secure-dir
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          printf 'ARTIFACTS_DIR=%s\n' "$(mktemp -d -p "$RUNNER_TEMP" bgobs-release.XXXXXXXXXX)" >> "$GITHUB_OUTPUT"

      - name: Download tested platform packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: pluginbinary-*
          merge-multiple: true
          path: ${{ steps.secure-dir.outputs.ARTIFACTS_DIR }}

      - name: Validate assets and generate checksums and SPDX asset manifest
        shell: bash --noprofile --norc -euo pipefail {0}
        env:
          ARTIFACTS_DIR: '${{ steps.secure-dir.outputs.ARTIFACTS_DIR }}'
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION $version." >&2
            exit 1
          fi
          python3 scripts/generate_release_metadata.py \
            --artifact-dir "$ARTIFACTS_DIR" \
            --version "$version"

      - name: Attest packages, checksums, and SPDX asset manifest
        id: attest
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.secure-dir.outputs.ARTIFACTS_DIR }}/*

      - name: Add downloadable provenance bundle
        shell: bash --noprofile --norc -euo pipefail {0}
        env:
          ARTIFACTS_DIR: '${{ steps.secure-dir.outputs.ARTIFACTS_DIR }}'
          BUNDLE_PATH: '${{ steps.attest.outputs.bundle-path }}'
        run: |
          version="$(tr -d '\r\n' < VERSION)"
          test -s "$BUNDLE_PATH"
          cp "$BUNDLE_PATH" "$ARTIFACTS_DIR/BGOBS-$version-provenance.jsonl"

      - name: Publish aggregated GitHub release
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          ARTIFACTS_DIR: '${{ steps.secure-dir.outputs.ARTIFACTS_DIR }}'
          GH_REPO: '${{ github.repository }}'
          GH_TOKEN: '${{ github.token }}'
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          notes_file="release-notes/$tag.md"
          test -s "$notes_file"

          release_flags=()
          version_without_build="${version%%+*}"
          if [[ "$version_without_build" == *-* ]]; then
            release_flags+=(--prerelease)
          else
            release_flags+=(--prerelease=false --latest)
          fi

          publish_draft=false
          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "$(gh release view "$tag" --json isDraft --jq .isDraft)" == true ]]; then
              publish_draft=true
            fi
          else
            gh release create "$tag" \
              --draft \
              --verify-tag \
              --title "BGOBS $version" \
              --notes-file "$notes_file"
            publish_draft=true
          fi

          assets=("$ARTIFACTS_DIR"/*)
          if (( ${#assets[@]} < 9 )); then
            echo "The aggregated release is missing expected metadata or packages." >&2
            exit 1
          fi

          declare -A expected_assets=()
          for asset in "${assets[@]}"; do
            expected_assets["$(basename "$asset")"]=1
          done
          unexpected_assets=()
          while IFS= read -r existing_asset; do
            [[ -n "$existing_asset" ]] || continue
            if [[ -z "${expected_assets[$existing_asset]+present}" ]]; then
              unexpected_assets+=("$existing_asset")
            fi
          done < <(gh release view "$tag" --json assets --jq '.assets[].name')
          if (( ${#unexpected_assets[@]} > 0 )); then
            echo "The release already contains assets outside this verified build:" >&2
            printf '  %s\n' "${unexpected_assets[@]}" >&2
            echo "Remove or preserve them explicitly before rerunning the release." >&2
            exit 1
          fi

          gh release upload "$tag" "${assets[@]}" --clobber

          edit_flags=(--title "BGOBS $version" --notes-file "$notes_file")
          edit_flags+=("${release_flags[@]}")
          if [[ "$publish_draft" == true ]]; then
            edit_flags+=(--draft=false)
          fi
          gh release edit "$tag" "${edit_flags[@]}"
