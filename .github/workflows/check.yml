name: Check CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-rust:
    name: Check Rust core
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Test
        run: cargo test --workspace --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  check-pages:
    name: Check website
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: pages
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: pages/.node-version
          cache: npm
          cache-dependency-path: pages/package-lock.json
      - run: npm ci
      - name: Audit dependencies
        run: npm audit
      - name: Unit tests
        run: npm test
      - name: Check formatting
        run: npx prettier --check .
      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build

  check-clang-format:
    name: Check clang-format

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install clang-format with Linuxbrew
        shell: bash
        env:
          HOMEBREW_NO_ANALYTICS: "1"
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_ENV_HINTS: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          set -euo pipefail
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install obsproject/tools/clang-format@19
          echo "$(brew --prefix obsproject/tools/clang-format@19)/bin" >> "$GITHUB_PATH"

      - name: Check with clang-format
        shell: bash
        run: |
          set -euo pipefail
          git ls-files "*.c" "*.cpp" "*.h" "*.hpp" | xargs --no-run-if-empty clang-format-19 --dry-run --Werror

  check-gersemi:
    name: Check gersemi

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python for gersemi
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          pip-install: gersemi==0.27.7

      - name: Check with gersemi
        shell: bash
        run: |
          set -euo pipefail
          gersemi --check CMakeLists.txt

  check-reuse:
    name: Check reuse

    runs-on: ubuntu-slim
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python for REUSE
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          pip-install: reuse

      - name: Lint with REUSE
        shell: bash
        run: reuse lint
