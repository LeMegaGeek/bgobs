name: Windows Package

on:
  workflow_call:
    inputs:
      environment:
        description: The environment name for the build jobs, or empty string for no environment
        required: false
        type: string
        default: ''
      VCPKG_BINARY_SOURCES:
        description: VCPKG_BINARY_SOURCES environment variable for the build jobs
        required: true
        type: string
      vcpkg-version:
        description: The version of vcpkg to clone.
        required: true
        type: string
      ort-version:
        description: The ONNX Runtime version.
        required: true
        type: string

permissions: {}

jobs:
  build-windows-x64:
    environment: ${{ inputs.environment }}
    runs-on: windows-2022
    timeout-minutes: 180

    permissions:
      contents: read

    env:
      CLEAN_PWSH_ENV: '${{ github.workspace }}\.github\scripts\clean-env-windows.ps1'
      FILTERED_PATH: 'C:\Users\runneradmin\.cargo\bin;C:\ProgramData\chocolatey\bin;C:\Program Files\CMake\bin;C:\Program Files\Git\cmd;C:\Windows\System32\WindowsPowerShell\v1.0;C:\Windows\System32;C:\Windows'
      ORT_CCACHE_DIR: '${{ github.workspace }}\.ort_ccache'
      ROOT_VCPKG_ROOT: '${{ github.workspace }}\vcpkg'

    steps:
      - name: Enable Windows long path
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1

      - name: Output Image Metadata
        id: image-metadata
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          echo "ImageVersion=$ImageVersion" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python for build requirements
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      # ASSERT: The directory of python3 executable is always prepended to the PATH specified in the env section.

      - name: Set up ccache
        id: setup-ccache
        uses: ./.github/actions/setup-ccache

      # ASSERT: The directory of ccache executable is prepended to the PATH even if PATH is overridden in the env section.

      - name: Print CMake version on Windows
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          . $env:CLEAN_PWSH_ENV
          cmake --version

      - name: Print Ninja version on Windows
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          . $env:CLEAN_PWSH_ENV
          ninja --version

      - name: Print vswhere information for Visual Studio 2022 on Windows
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          . $env:CLEAN_PWSH_ENV
          vswhere -version '[17.0,18.0)'

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ inputs.vcpkg-version || '9849e070ad4c3383890fb1c80ae0c54325e2484a' }}
          persist-credentials: false
          path: ${{ env.ROOT_VCPKG_ROOT }}

      - name: Run bootstrap-vcpkg.bat
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_ROOT: '${{ env.ROOT_VCPKG_ROOT }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $bootstrapVcpkgPath = "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          & $bootstrapVcpkgPath -disableMetrics

      - name: Install dependencies from vcpkg (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_BINARY_SOURCES: "${{ inputs.VCPKG_BINARY_SOURCES || 'clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha},read' }}"
          VCPKG_ROOT: '${{ env.ROOT_VCPKG_ROOT }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $vcpkgPath = "$env:VCPKG_ROOT\vcpkg.exe"
          & $vcpkgPath install --x-install-root=.\.deps_vendor\vcpkg_installed --triplet=x64-windows-static-md-obs
          & $vcpkgPath install libusb --classic --x-install-root=.\.deps_vendor\libusb_installed --triplet=x64-windows

      - name: Download dependencies (Windows)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          cmake -P ./scripts/download_deps.cmake

      - name: Download Android platform-tools (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $VendorDir = Join-Path $pwd '.deps_vendor'
          $Archive = Join-Path $VendorDir 'platform-tools-windows.zip'
          $ExtractDir = Join-Path $VendorDir 'platform-tools-windows'
          $Url = 'https://dl.google.com/android/repository/platform-tools-latest-windows.zip'

          New-Item -ItemType Directory -Path $VendorDir -Force
          Invoke-WebRequest -Uri $Url -OutFile $Archive
          Remove-Item -Path $ExtractDir -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -Path $Archive -DestinationPath $ExtractDir -Force

          foreach ($RequiredPath in @(
            "$ExtractDir\platform-tools\adb.exe",
            "$ExtractDir\platform-tools\AdbWinApi.dll",
            "$ExtractDir\platform-tools\AdbWinUsbApi.dll"
          )) {
            if (-not (Test-Path $RequiredPath -PathType Leaf)) {
              Write-Error "Required Android platform-tools file is missing: $RequiredPath"
              exit 1
            }
          }

      - name: Build libobs (Windows)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          ./scripts/build_libobs_windows.ps1

      - name: Download ONNX Runtime (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $OrtTag = '${{ inputs.ort-version || 'v1.23.2' }}'
          $OrtVersion = $OrtTag.TrimStart('v')
          $VendorDir = Join-Path $pwd '.deps_vendor'
          $Archive = Join-Path $VendorDir "onnxruntime-win-x64-$OrtVersion.zip"
          $ExtractDir = Join-Path $VendorDir 'onnxruntime-download'
          $SourceDir = Join-Path $ExtractDir "onnxruntime-win-x64-$OrtVersion"
          $PrefixDir = Join-Path $VendorDir 'ort_x64-prefix'
          $Url = "https://github.com/microsoft/onnxruntime/releases/download/$OrtTag/onnxruntime-win-x64-$OrtVersion.zip"

          New-Item -ItemType Directory -Path $VendorDir -Force
          Invoke-WebRequest -Uri $Url -OutFile $Archive
          Remove-Item -Path $ExtractDir, $PrefixDir -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -Path $Archive -DestinationPath $ExtractDir -Force
          New-Item -ItemType Directory -Path $PrefixDir -Force
          Copy-Item -Path "$SourceDir\*" -Destination $PrefixDir -Recurse -Force

          foreach ($RequiredPath in @(
            "$PrefixDir\include\onnxruntime_cxx_api.h",
            "$PrefixDir\lib\onnxruntime.lib",
            "$PrefixDir\lib\onnxruntime.dll"
          )) {
            if (-not (Test-Path $RequiredPath -PathType Leaf)) {
              Write-Error "Required ONNX Runtime file is missing: $RequiredPath"
              exit 1
            }
          }

      - name: Configure (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_ROOT: '${{ env.ROOT_VCPKG_ROOT }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          $Spec = Get-Content buildspec.json -Raw | ConvertFrom-Json
          $DepsDir = Join-Path $pwd ".deps"
          $PrebuiltVersion = $Spec.dependencies.prebuilt.version
          $Qt6Version = $Spec.dependencies.qt6.version
          $PrebuiltDir = Join-Path $DepsDir "obs-deps-$PrebuiltVersion-x64"
          $Qt6Dir = Join-Path $DepsDir "obs-deps-qt6-$Qt6Version-x64"
          $VcpkgInstalledDir = Join-Path $pwd ".deps_vendor\vcpkg_installed"
          $VcpkgTripletDir = Join-Path $VcpkgInstalledDir "x64-windows-static-md-obs"
          $OrtPrefix = Join-Path $pwd ".deps_vendor\ort_x64-prefix"
          $PrefixPath = @($DepsDir, $PrebuiltDir, $Qt6Dir, $VcpkgTripletDir, $OrtPrefix) -join ";"
          $VcpkgToolchain = Join-Path $env:VCPKG_ROOT "scripts\buildsystems\vcpkg.cmake"

          $CmakeArgs = @(
            "-S", ".",
            "-B", "build_x64",
            "-G", "Visual Studio 17 2022",
            "-A", "x64",
            "-DCMAKE_INSTALL_PREFIX=$pwd\_install",
            "-DCMAKE_PREFIX_PATH=$PrefixPath",
            "-DCMAKE_TOOLCHAIN_FILE=$VcpkgToolchain",
            "-DVCPKG_INSTALLED_DIR=$VcpkgInstalledDir",
            "-DVCPKG_TARGET_TRIPLET=x64-windows-static-md-obs",
            "-DBGOBS_PACKAGE_SIGNING_STATUS=unsigned",
            "-DBUILD_TESTING=ON"
          )

          cmake @CmakeArgs

      - name: Build (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          cmake --build build_x64 --config RelWithDebInfo --parallel

      - name: Test (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          ctest --test-dir build_x64 -C RelWithDebInfo --output-on-failure

      - name: Package (Windows x64)
        shell: pwsh
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest
          $PSNativeCommandUseErrorActionPreference = $true

          . $env:CLEAN_PWSH_ENV

          ./scripts/package_plugin_windows.ps1 -Target x64

      - name: Upload Plugin Binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pluginbinary-windows-x64-${{ github.run_id }}
          path: release
          if-no-files-found: error
          retention-days: 7
